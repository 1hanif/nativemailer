name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    env:
      NATIVEPHP_UPDATER_ENABLED: true
      NATIVEPHP_UPDATER_PROVIDER: github
      GITHUB_OWNER: projecthanif
      GITHUB_REPO: nativemailer
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, zip, pdo_sqlite, mailparse

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install JS dependencies & build assets
        run: |
          npm ci
          npm run build

      - name: Prepare environment
        shell: bash
        run: |
          cp .env.example .env
          php artisan key:generate
          # Use the tag (without the leading "v") as the app version
          echo "NATIVEPHP_APP_VERSION=${GITHUB_REF_NAME#v}" >> .env

      - name: Build native app
        run: php artisan native:build ${{ matrix.platform }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap
